name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: lecture1/my-fashion-shop
        run: npm install
      - name: Build
        working-directory: lecture1/my-fashion-shop
        env:
          VITE_SUPABASE_URL: https://zamccnhsslvushkiltfm.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_lmC4qUo70SPlja4XuREU3Q_BFMrPg-r
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: lecture1/my-fashion-shop/dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
